<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniMax TTS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh;padding:24px}
h1{text-align:center;color:#7c6cfc;margin-bottom:6px;font-size:22px}
.subtitle{text-align:center;color:#555;margin-bottom:28px;font-size:13px}
.container{max-width:720px;margin:0 auto}
.card{background:#1a1a2e;border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid #2a2a4a}
.card-title{font-size:12px;color:#7c6cfc;margin-bottom:10px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
textarea{width:100%;background:#12122a;border:1px solid #2a2a4a;border-radius:10px;color:#e0e0e0;padding:12px;font-size:15px;resize:vertical;min-height:100px;outline:none;transition:border-color .2s;line-height:1.5}
textarea:focus{border-color:#7c6cfc}
textarea::placeholder{color:#444}
.btn-row{display:flex;gap:10px;margin-top:12px}
button{flex:1;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#7c6cfc;color:#fff}
.btn-primary:hover{background:#6a5ae0}
.btn-primary:disabled{background:#3a3a6a;color:#666;cursor:not-allowed}
.btn-secondary{background:#252540;color:#aaa}
.btn-secondary:hover{background:#30305a}
.player-card{display:none}
.player-card.active{display:block}
audio{width:100%;margin-top:10px;height:40px;border-radius:8px}
.status{text-align:center;font-size:13px;color:#555;margin-top:10px;min-height:20px}
.status.loading{color:#7c6cfc}
.status.error{color:#fc6c6c}
.lang-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.lang-tab{padding:5px 12px;border-radius:20px;font-size:12px;background:#1a1a2e;border:1px solid #2a2a4a;color:#777;cursor:pointer;transition:all .2s}
.lang-tab:hover{border-color:#7c6cfc;color:#b0b0c0}
.lang-tab.active{background:#7c6cfc;border-color:#7c6cfc;color:#fff}
.voice-hint{font-size:11px;color:#555;margin-bottom:8px}
.download-btn{display:inline-block;text-align:center;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;background:#252540;color:#aaa;text-decoration:none;flex:1;transition:all .2s}
.download-btn:hover{background:#30305a}
.btn-group{display:flex;gap:10px;margin-top:10px}
.info-row{display:flex;gap:8px;align-items:center;margin-top:8px}
.info-row label{font-size:12px;color:#666;white-space:nowrap}
.info-row input{background:#12122a;border:1px solid #2a2a4a;border-radius:8px;color:#e0e0e0;padding:8px 12px;font-size:13px;flex:1;outline:none}
.info-row input:focus{border-color:#7c6cfc}
.clear-btn{font-size:11px;color:#555;cursor:pointer;padding:4px 8px;border-radius:6px;border:1px solid transparent;transition:all .2s;white-space:nowrap}
.clear-btn:hover{color:#fc6c6c;border-color:#fc6c6c}
.model-row{display:flex;gap:8px;margin-top:8px}
.model-row label{font-size:12px;color:#666;white-space:nowrap;align-self:center}
.model-row select{flex:1}
.footer{text-align:center;font-size:12px;color:#333;margin-top:24px}
.footer a{color:#7c6cfc;text-decoration:none}
</style>
</head>
<body>
<div class="container">
<h1>MiniMax TTS</h1>
<div class="subtitle">Speech 2.6 API · 332 voices</div>
<div class="card">
<div class="card-title">API</div>
<div class="info-row">
<label>API Key</label>
<input type="password" id="apiKey" placeholder="sk-cp-xxxxxxxx" value="">
<span class="clear-btn" onclick="document.getElementById('apiKey').value=''">X</span>
</div>
<div class="model-row">
<label>Model</label>
<select id="modelSelect">
<option value="speech-2.6-turbo">speech-2.6-turbo (fast)</option>
<option value="speech-02.6">speech-02.6 (high quality)</option>
</select>
</div>
</div>
<div class="card">
<div class="card-title">Text</div>
<textarea id="text" placeholder="Enter text..."></textarea>
<div class="btn-row">
<button class="btn-primary" id="generateBtn" onclick="generate()">Generate</button>
<button class="btn-secondary" onclick="document.getElementById('text').value=''">Clear</button>
</div>
<div class="status" id="status"></div>
</div>
<div class="card">
<div class="card-title">Voice</div>
<div class="lang-tabs" id="langTabs"></div>
<div class="voice-hint" id="voiceHint"></div>
<select id="voiceSelect" size="10"></select>
</div>
<div class="card player-card" id="playerCard">
<div class="card-title">Audio</div>
<audio id="audioPlayer" controls></audio>
<div class="btn-group">
<a id="downloadBtn" class="download-btn" download>Download</a>
<button class="btn-secondary" onclick="document.getElementById('playerCard').classList.remove('active')" style="flex:0 0 auto;padding:11px 14px">Close</button>
</div>
</div>
<div class="footer"><a href="https://platform.minimax.io" target="_blank">MiniMax Platform</a></div>
</div>
<script src="app.js"></script>
</body>
</html>
